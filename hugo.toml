baseURL = "https://expatnetherlandshub.com/"
languageCode = "en-us"
title = "Expat Netherlands Hub"
theme = "starter"

[params]
  description = "Free tools and expert guides for expats moving to the Netherlands. Calculate your 30% ruling, compare health insurance, find the best bank, and more."
  author = "Sarah van den Berg"
  author_bio = "Expat coach with 8 years of experience helping internationals navigate Dutch bureaucracy. Half-Dutch, half-British, fully obsessed with making expat life easier."
  tagline = "Your Step-by-Step Decision Engine for Expat Life in the Netherlands"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[menu]
  [[menu.main]]
    name = "Tools"
    url = "/tools/"
    weight = 1
  [[menu.main]]
    name = "Guides"
    url = "/guides/"
    weight = 2
  [[menu.main]]
    name = "Cities"
    url = "/cities/"
    weight = 3
  [[menu.main]]
    name = "Services"
    url = "/services/"
    weight = 4
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 5

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[params.sitemapPriorities]
  home = 1.0
  tools = 0.9
  guides = 0.9
  cities = 0.8
  services = 0.8
  categories = 0.6
  tags = 0.4

[taxonomies]
  category = "categories"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
