<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="orangeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle diagonal lines -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="520" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="600" cy="315" r="230" fill="none" stroke="#f97316" stroke-width="1" opacity="0.06"/>
  <circle cx="600" cy="315" r="290" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.04"/>

  <!-- 1. BRIEFCASE (center-left, large) -->
  <g transform="translate(120, 180)">
    <!-- Briefcase body -->
    <rect x="0" y="60" width="260" height="180" rx="16" fill="white" opacity="0.9"/>
    <!-- Briefcase top handle area -->
    <rect x="0" y="60" width="260" height="16" rx="8" fill="white" opacity="0.7"/>
    <!-- Handle -->
    <path d="M80,60 L80,30 Q80,10 130,10 Q180,10 180,30 L180,60" fill="none" stroke="url(#orangeGrad)" stroke-width="12" stroke-linecap="round"/>
    <!-- Center clasp/band -->
    <rect x="0" y="140" width="260" height="20" rx="0" fill="#f97316" opacity="0.8"/>
    <!-- Clasp buckle -->
    <rect x="105" y="135" width="50" height="30" rx="6" fill="#ea580c"/>
    <rect x="115" y="145" width="30" height="10" rx="3" fill="#fb923c" opacity="0.7"/>
    <!-- Lock on clasp -->
    <circle cx="130" cy="150" r="6" fill="white" opacity="0.5"/>
    <!-- Briefcase details - lines suggesting contents -->
    <line x1="30" y1="180" x2="230" y2="180" stroke="#f97316" stroke-width="2" opacity="0.2"/>
    <line x1="30" y1="200" x2="180" y2="200" stroke="#f97316" stroke-width="2" opacity="0.2"/>
    <line x1="30" y1="220" x2="200" y2="220" stroke="#f97316" stroke-width="2" opacity="0.2"/>
  </g>

  <!-- 2. RISING CHART / GROWTH (center) -->
  <g transform="translate(480, 160)">
    <!-- Chart background -->
    <rect x="0" y="0" width="240" height="200" rx="12" fill="white" opacity="0.07"/>
    <!-- Grid lines -->
    <line x1="20" y1="40" x2="220" y2="40" stroke="white" stroke-width="1" opacity="0.1"/>
    <line x1="20" y1="80" x2="220" y2="80" stroke="white" stroke-width="1" opacity="0.1"/>
    <line x1="20" y1="120" x2="220" y2="120" stroke="white" stroke-width="1" opacity="0.1"/>
    <line x1="20" y1="160" x2="220" y2="160" stroke="white" stroke-width="1" opacity="0.1"/>
    <!-- Bars -->
    <rect x="30" y="120" width="28" height="60" rx="4" fill="#ea580c" opacity="0.8"/>
    <rect x="72" y="90" width="28" height="90" rx="4" fill="#f97316" opacity="0.85"/>
    <rect x="114" y="65" width="28" height="115" rx="4" fill="#fb923c" opacity="0.9"/>
    <rect x="156" y="30" width="28" height="150" rx="4" fill="url(#orangeGrad)"/>
    <!-- Upward trend arrow -->
    <polyline points="44,115 88,82 130,58 172,25" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Arrow head -->
    <polygon points="172,25 158,28 165,40" fill="white" opacity="0.9"/>
    <!-- Axis -->
    <line x1="20" y1="10" x2="20" y2="178" stroke="white" stroke-width="2" opacity="0.3"/>
    <line x1="18" y1="178" x2="225" y2="178" stroke="white" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- 3. DIPLOMA / CERTIFICATE (right) -->
  <g transform="translate(800, 170)">
    <!-- Certificate paper -->
    <rect x="0" y="0" width="200" height="150" rx="10" fill="white" opacity="0.88"/>
    <!-- Top ribbon/seal area -->
    <rect x="0" y="0" width="200" height="30" rx="10" fill="url(#orangeGrad2)" opacity="0.9"/>
    <rect x="0" y="20" width="200" height="10" fill="url(#orangeGrad2)" opacity="0.9"/>
    <!-- Certificate text lines -->
    <rect x="20" y="50" width="160" height="8" rx="4" fill="#1e293b" opacity="0.2"/>
    <rect x="30" y="68" width="140" height="6" rx="3" fill="#1e293b" opacity="0.15"/>
    <rect x="20" y="84" width="160" height="6" rx="3" fill="#1e293b" opacity="0.15"/>
    <rect x="40" y="100" width="120" height="6" rx="3" fill="#1e293b" opacity="0.12"/>
    <!-- Seal/stamp -->
    <circle cx="100" cy="125" r="18" fill="#f97316" opacity="0.3"/>
    <circle cx="100" cy="125" r="14" fill="none" stroke="#f97316" stroke-width="2" opacity="0.5"/>
    <circle cx="100" cy="125" r="8" fill="#f97316" opacity="0.5"/>
    <!-- Ribbon tails -->
    <polygon points="85,143 90,160 100,155 110,160 115,143" fill="#f97316" opacity="0.6"/>
  </g>

  <!-- 4. NETWORKING / PEOPLE (bottom center) -->
  <g transform="translate(380, 420)">
    <!-- Person 1 (left) -->
    <circle cx="30" cy="30" r="22" fill="white" opacity="0.85"/>
    <circle cx="30" cy="30" r="12" fill="#f97316" opacity="0.6"/>
    <!-- Person 2 (center) -->
    <circle cx="110" cy="20" r="26" fill="white" opacity="0.9"/>
    <circle cx="110" cy="20" r="14" fill="#fb923c" opacity="0.7"/>
    <!-- Person 3 (right) -->
    <circle cx="190" cy="30" r="22" fill="white" opacity="0.85"/>
    <circle cx="190" cy="30" r="12" fill="#ea580c" opacity="0.6"/>
    <!-- Connection lines -->
    <line x1="52" y1="30" x2="84" y2="24" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="136" y1="24" x2="168" y2="30" stroke="white" stroke-width="2" opacity="0.4"/>
    <!-- Body shapes -->
    <path d="M10,75 Q10,55 30,55 Q50,55 50,75" fill="white" opacity="0.8"/>
    <path d="M86,75 Q86,50 110,50 Q134,50 134,75" fill="white" opacity="0.85"/>
    <path d="M170,75 Q170,55 190,55 Q210,55 210,75" fill="white" opacity="0.8"/>
  </g>

  <!-- Corner accents -->
  <line x1="30" y1="30" x2="100" y2="30" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="30" x2="30" y2="100" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1100" y2="600" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1170" y2="530" stroke="#f97316" stroke-width="2" opacity="0.3"/>
</svg>
