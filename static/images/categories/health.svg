<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="orangeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="600" cy="315" r="240" fill="none" stroke="#f97316" stroke-width="1" opacity="0.06"/>
  <circle cx="600" cy="315" r="300" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.04"/>

  <!-- 1. LARGE CROSS / PLUS SYMBOL (center) -->
  <g transform="translate(420, 140)">
    <!-- Cross background circle -->
    <circle cx="180" cy="180" r="160" fill="#f97316" opacity="0.1"/>
    <circle cx="180" cy="180" r="120" fill="#f97316" opacity="0.08"/>
    <!-- Cross shape -->
    <rect x="140" y="60" width="80" height="240" rx="12" fill="url(#orangeGrad)" opacity="0.9"/>
    <rect x="60" y="140" width="240" height="80" rx="12" fill="url(#orangeGrad)" opacity="0.9"/>
  </g>

  <!-- 2. HEART / HEARTBEAT (left side) -->
  <g transform="translate(60, 180)">
    <!-- Heart shape -->
    <path d="M100,70 C100,30 60,10 35,35 C10,60 10,100 100,160 C190,100 190,60 165,35 C140,10 100,30 100,70Z" fill="url(#orangeGrad2)" opacity="0.7"/>
    <!-- Heartbeat line -->
    <polyline points="0,250 60,250 80,250 100,210 120,290 140,230 160,260 200,260 260,260" fill="none" stroke="#fb923c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- 3. CLIPBOARD / MEDICAL FORM (right side) -->
  <g transform="translate(850, 120)">
    <!-- Clipboard body -->
    <rect x="20" y="30" width="200" height="280" rx="12" fill="white" opacity="0.08"/>
    <rect x="20" y="30" width="200" height="280" rx="12" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>
    <!-- Clipboard clip -->
    <rect x="70" y="15" width="100" height="30" rx="6" fill="#fb923c" opacity="0.7"/>
    <rect x="90" y="8" width="60" height="18" rx="9" fill="#ea580c" opacity="0.8"/>
    <!-- Lines on clipboard -->
    <line x1="55" y1="90" x2="195" y2="90" stroke="white" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <line x1="55" y1="120" x2="195" y2="120" stroke="white" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <line x1="55" y1="150" x2="160" y2="150" stroke="white" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <line x1="55" y1="180" x2="195" y2="180" stroke="white" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <line x1="55" y1="210" x2="140" y2="210" stroke="white" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <!-- Checkmark -->
    <polyline points="55,245 75,265 115,225" fill="none" stroke="#fb923c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- 4. STETHOSCOPE (bottom left) -->
  <g transform="translate(300, 380)">
    <!-- Tube -->
    <path d="M0,20 Q0,120 80,120 Q160,120 160,20" fill="none" stroke="#fb923c" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
    <!-- Earpieces -->
    <circle cx="0" cy="15" r="10" fill="#f97316" opacity="0.6"/>
    <circle cx="160" cy="15" r="10" fill="#f97316" opacity="0.6"/>
    <!-- Chest piece -->
    <circle cx="80" cy="140" r="30" fill="url(#orangeGrad2)" opacity="0.6"/>
    <circle cx="80" cy="140" r="18" fill="#1e293b" opacity="0.5"/>
  </g>

  <!-- 5. PILL CAPSULES (bottom right) -->
  <g transform="translate(750, 430)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="100" height="40" rx="20" fill="white" opacity="0.15" transform="rotate(-20, 50, 20)"/>
    <rect x="50" y="0" width="50" height="40" rx="0 20 20 0" fill="#f97316" opacity="0.6" transform="rotate(-20, 50, 20)"/>
    <!-- Pill 2 -->
    <rect x="120" y="30" width="100" height="40" rx="20" fill="white" opacity="0.12" transform="rotate(15, 170, 50)"/>
    <rect x="170" y="30" width="50" height="40" rx="0 20 20 0" fill="#fb923c" opacity="0.5" transform="rotate(15, 170, 50)"/>
  </g>

  <!-- Corner accents -->
  <line x1="30" y1="30" x2="100" y2="30" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="30" x2="30" y2="100" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1100" y2="600" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1170" y2="530" stroke="#f97316" stroke-width="2" opacity="0.3"/>
</svg>