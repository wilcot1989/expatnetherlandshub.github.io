    <circle cx="100" cy="220" r="3"/><circle cx="160" cy="220" r="3"/><circle cx="220" cy="220" r="3"/><circle cx="280" cy="220" r="3"/><circle cx="340" cy="220" r="3"/>
    <circle cx="860" cy="410" r="3"/><circle cx="920" cy="410" r="3"/><circle cx="980" cy="410" r="3"/><circle cx="1040" cy="410" r="3"/><circle cx="1100" cy="410" r="3"/>
