<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="orangeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="600" cy="315" r="230" fill="none" stroke="#f97316" stroke-width="1" opacity="0.06"/>
  <circle cx="600" cy="315" r="290" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.04"/>

  <!-- 1. LARGE HOUSE (center-left) -->
  <g transform="translate(80, 150)">
    <!-- Roof -->
    <polygon points="200,0 400,180 0,180" fill="url(#roofGrad)" opacity="0.9"/>
    <!-- Roof ridge cap -->
    <polygon points="200,0 215,20 185,20" fill="#1e293b" opacity="0.3"/>
    <!-- Chimney -->
    <rect x="290" y="30" width="35" height="80" rx="4" fill="white" opacity="0.75"/>
    <rect x="285" y="24" width="45" height="12" rx="3" fill="white" opacity="0.6"/>
    <!-- Smoke from chimney -->
    <path d="M305,20 Q295,5 310,-10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <path d="M318,18 Q308,0 325,-15" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <!-- House body -->
    <rect x="0" y="180" width="400" height="240" rx="8" fill="white" opacity="0.88"/>
    <!-- Door (center) -->
    <rect x="155" y="300" width="90" height="120" rx="45" fill="#f97316" opacity="0.7"/>
    <rect x="155" y="340" width="90" height="80" fill="#f97316" opacity="0.7"/>
    <!-- Door knob -->
    <circle cx="228" cy="355" r="7" fill="white" opacity="0.6"/>
    <!-- Windows left -->
    <rect x="30" y="210" width="80" height="70" rx="8" fill="#f97316" opacity="0.4"/>
    <line x1="70" y1="210" x2="70" y2="280" stroke="white" stroke-width="3" opacity="0.4"/>
    <line x1="30" y1="245" x2="110" y2="245" stroke="white" stroke-width="3" opacity="0.4"/>
    <!-- Windows right -->
    <rect x="290" y="210" width="80" height="70" rx="8" fill="#f97316" opacity="0.4"/>
    <line x1="330" y1="210" x2="330" y2="280" stroke="white" stroke-width="3" opacity="0.4"/>
    <line x1="290" y1="245" x2="370" y2="245" stroke="white" stroke-width="3" opacity="0.4"/>
    <!-- Ground/step -->
    <rect x="100" y="416" width="200" height="12" rx="6" fill="#f97316" opacity="0.3"/>
  </g>

  <!-- 2. KEY (right side) -->
  <g transform="translate(780, 180)">
    <!-- Key head (circle) -->
    <circle cx="90" cy="90" r="80" fill="none" stroke="url(#orangeGrad)" stroke-width="18"/>
    <!-- Key hole -->
    <circle cx="90" cy="90" r="30" fill="none" stroke="url(#orangeGrad)" stroke-width="12"/>
    <!-- Key shaft -->
    <rect x="155" y="80" width="200" height="20" rx="10" fill="url(#orangeGrad)" opacity="0.9"/>
    <!-- Key teeth -->
    <rect x="220" y="100" width="18" height="35" rx="6" fill="url(#orangeGrad)" opacity="0.9"/>
    <rect x="260" y="100" width="18" height="25" rx="6" fill="url(#orangeGrad)" opacity="0.9"/>
    <rect x="300" y="100" width="18" height="40" rx="6" fill="url(#orangeGrad)" opacity="0.9"/>
    <rect x="340" y="100" width="18" height="20" rx="6" fill="url(#orangeGrad)" opacity="0.9"/>
  </g>

  <!-- 3. SMALL HOUSE (background, right) -->
  <g transform="translate(870, 360)" opacity="0.4">
    <polygon points="70,0 140,70 0,70" fill="white"/>
    <rect x="0" y="70" width="140" height="90" fill="white"/>
    <rect x="45" y="110" width="50" height="50" rx="25" fill="#f97316"/>
    <rect x="10" y="80" width="40" height="35" rx="5" fill="#f97316"/>
    <rect x="90" y="80" width="40" height="35" rx="5" fill="#f97316"/>
  </g>

  <!-- Corner accents -->
  <line x1="30" y1="30" x2="100" y2="30" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="30" x2="30" y2="100" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1100" y2="600" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1170" y2="530" stroke="#f97316" stroke-width="2" opacity="0.3"/>
</svg>
