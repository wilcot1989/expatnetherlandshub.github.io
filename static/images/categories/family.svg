<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="orangeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="520" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="600" cy="315" r="230" fill="none" stroke="#f97316" stroke-width="1" opacity="0.06"/>
  <circle cx="600" cy="315" r="290" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.04"/>

  <!-- FAMILY GROUP - adult 1 (left, taller) -->
  <g transform="translate(150, 130)">
    <!-- Head -->
    <circle cx="60" cy="50" r="45" fill="white" opacity="0.9"/>
    <!-- Hair suggestion -->
    <ellipse cx="60" cy="20" rx="45" ry="20" fill="#f97316" opacity="0.4"/>
    <!-- Body -->
    <path d="M5,200 Q5,120 60,120 Q115,120 115,200 L115,350 L5,350 Z" fill="white" opacity="0.85"/>
    <!-- Arm left (reaching) -->
    <path d="M5,180 Q-30,220 -10,270" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
    <!-- Arm right (reaching toward center) -->
    <path d="M115,180 Q160,200 180,170" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
    <!-- Legs -->
    <rect x="15" y="340" width="35" height="90" rx="17" fill="white" opacity="0.8"/>
    <rect x="65" y="340" width="35" height="90" rx="17" fill="white" opacity="0.8"/>
  </g>

  <!-- FAMILY GROUP - adult 2 (right, taller) -->
  <g transform="translate(920, 130)">
    <!-- Head -->
    <circle cx="60" cy="50" r="45" fill="white" opacity="0.9"/>
    <!-- Hair suggestion (longer) -->
    <ellipse cx="60" cy="18" rx="48" ry="22" fill="#fb923c" opacity="0.45"/>
    <rect x="20" y="20" width="8" height="60" rx="4" fill="#fb923c" opacity="0.35"/>
    <rect x="92" y="20" width="8" height="60" rx="4" fill="#fb923c" opacity="0.35"/>
    <!-- Body -->
    <path d="M5,200 Q5,120 60,120 Q115,120 115,200 L115,350 L5,350 Z" fill="white" opacity="0.85"/>
    <!-- Arm left (reaching toward center) -->
    <path d="M5,180 Q-40,200 -60,170" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
    <!-- Arm right -->
    <path d="M115,180 Q150,220 130,270" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
    <!-- Legs -->
    <rect x="15" y="340" width="35" height="90" rx="17" fill="white" opacity="0.8"/>
    <rect x="65" y="340" width="35" height="90" rx="17" fill="white" opacity="0.8"/>
  </g>

  <!-- FAMILY GROUP - child (center, shorter) -->
  <g transform="translate(520, 220)">
    <!-- Head -->
    <circle cx="80" cy="55" r="40" fill="white" opacity="0.95"/>
    <!-- Hair -->
    <ellipse cx="80" cy="25" rx="42" ry="20" fill="#f97316" opacity="0.5"/>
    <!-- Big smile suggestion -->
    <path d="M62,68 Q80,82 98,68" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Body -->
    <path d="M20,180 Q20,115 80,115 Q140,115 140,180 L140,300 L20,300 Z" fill="url(#orangeGrad2)" opacity="0.75"/>
    <!-- Arms (up, happy) -->
    <path d="M20,180 Q-20,140 -30,100" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.8"/>
    <path d="M140,180 Q180,140 190,100" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.8"/>
    <!-- Legs -->
    <rect x="30" y="290" width="30" height="70" rx="15" fill="white" opacity="0.8"/>
    <rect x="100" y="290" width="30" height="70" rx="15" fill="white" opacity="0.8"/>
  </g>

  <!-- HEART above the family -->
  <g transform="translate(530, 60)">
    <path d="M70,30 C70,10 45,0 35,15 C25,0 0,10 0,30 C0,55 35,80 35,80 C35,80 70,55 70,30 Z" fill="#f97316" opacity="0.7"/>
  </g>

  <!-- Corner accents -->
  <line x1="30" y1="30" x2="100" y2="30" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="30" x2="30" y2="100" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1100" y2="600" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1170" y2="530" stroke="#f97316" stroke-width="2" opacity="0.3"/>
</svg>
