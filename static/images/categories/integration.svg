<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="orangeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="600" cy="315" r="240" fill="none" stroke="#f97316" stroke-width="1" opacity="0.06"/>
  <circle cx="600" cy="315" r="300" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.04"/>

  <!-- 1. PEOPLE / COMMUNITY (center) -->
  <g transform="translate(350, 120)">
    <!-- Central person -->
    <circle cx="250" cy="80" r="40" fill="url(#orangeGrad)" opacity="0.8"/>
    <path d="M200,140 Q250,130 300,140 L320,260 Q250,280 180,260 Z" fill="url(#orangeGrad)" opacity="0.6"/>
    <!-- Left person -->
    <circle cx="100" cy="110" r="35" fill="white" opacity="0.15"/>
    <path d="M55,165 Q100,155 145,165 L160,270 Q100,285 40,270 Z" fill="white" opacity="0.1"/>
    <!-- Right person -->
    <circle cx="400" cy="110" r="35" fill="white" opacity="0.15"/>
    <path d="M355,165 Q400,155 445,165 L460,270 Q400,285 340,270 Z" fill="white" opacity="0.1"/>
    <!-- Connection lines -->
    <line x1="135" y1="110" x2="210" y2="90" stroke="#fb923c" stroke-width="2" opacity="0.4" stroke-dasharray="6,4"/>
    <line x1="365" y1="110" x2="290" y2="90" stroke="#fb923c" stroke-width="2" opacity="0.4" stroke-dasharray="6,4"/>
  </g>

  <!-- 2. DUTCH FLAG (left side) -->
  <g transform="translate(70, 160)">
    <!-- Flag pole -->
    <rect x="0" y="0" width="6" height="260" rx="3" fill="white" opacity="0.5"/>
    <circle cx="3" cy="0" r="8" fill="#fb923c" opacity="0.7"/>
    <!-- Flag -->
    <rect x="10" y="15" width="160" height="40" rx="2" fill="#AE1C28" opacity="0.7"/>
    <rect x="10" y="55" width="160" height="40" rx="0" fill="white" opacity="0.7"/>
    <rect x="10" y="95" width="160" height="40" rx="2" fill="#21468B" opacity="0.7"/>
    <!-- Orange pennant (Prinsenvlag touch) -->
    <polygon points="6,10 40,0 6,20" fill="#f97316" opacity="0.6"/>
  </g>

  <!-- 3. HANDSHAKE (bottom center) -->
  <g transform="translate(400, 400)">
    <!-- Left hand -->
    <path d="M0,60 L60,30 L120,50 L140,40" fill="none" stroke="white" stroke-width="6" opacity="0.3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right hand -->
    <path d="M260,60 L200,30 L140,50 L120,40" fill="none" stroke="#fb923c" stroke-width="6" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Clasp area -->
    <circle cx="130" cy="45" r="20" fill="#f97316" opacity="0.2"/>
    <!-- Arms -->
    <path d="M0,60 L-40,100" stroke="white" stroke-width="8" opacity="0.2" stroke-linecap="round"/>
    <path d="M260,60 L300,100" stroke="#fb923c" stroke-width="8" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- 4. SPEECH BUBBLES (right side) -->
  <g transform="translate(850, 140)">
    <!-- Bubble 1 -->
    <rect x="0" y="0" width="200" height="100" rx="16" fill="white" opacity="0.08"/>
    <rect x="0" y="0" width="200" height="100" rx="16" fill="none" stroke="white" stroke-width="2" opacity="0.12"/>
    <polygon points="40,100 60,130 80,100" fill="white" opacity="0.08"/>
    <!-- Lines in bubble -->
    <line x1="25" y1="30" x2="175" y2="30" stroke="white" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
    <line x1="25" y1="50" x2="150" y2="50" stroke="white" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
    <line x1="25" y1="70" x2="110" y2="70" stroke="white" stroke-width="3" opacity="0.12" stroke-linecap="round"/>
    <!-- Bubble 2 -->
    <rect x="60" y="150" width="200" height="80" rx="16" fill="#f97316" opacity="0.15"/>
    <rect x="60" y="150" width="200" height="80" rx="16" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.2"/>
    <polygon points="200,230 220,255 180,230" fill="#f97316" opacity="0.15"/>
    <!-- Lines in bubble 2 -->
    <line x1="85" y1="178" x2="235" y2="178" stroke="#fb923c" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <line x1="85" y1="200" x2="200" y2="200" stroke="#fb923c" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- 5. PUZZLE PIECES (bottom left) -->
  <g transform="translate(100, 400)">
    <!-- Piece 1 -->
    <path d="M0,30 L40,30 L40,20 C40,5 60,5 60,20 L60,30 L100,30 L100,70 L90,70 C75,70 75,90 90,90 L100,90 L100,130 L0,130 Z" fill="url(#orangeGrad2)" opacity="0.4"/>
    <!-- Piece 2 -->
    <path d="M110,30 L150,30 L150,20 C150,5 170,5 170,20 L170,30 L210,30 L210,70 L200,70 C185,70 185,90 200,90 L210,90 L210,130 L110,130 L110,90 L120,90 C135,90 135,70 120,70 L110,70 Z" fill="#f97316" opacity="0.35"/>
  </g>

  <!-- Corner accents -->
  <line x1="30" y1="30" x2="100" y2="30" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="30" x2="30" y2="100" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1100" y2="600" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1170" y2="530" stroke="#f97316" stroke-width="2" opacity="0.3"/>
</svg>